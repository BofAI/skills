interface:
  display_name: "Twitter Digest"
  short_description: "Generate X/Twitter daily digests from own account"
  default_prompt: "Use $twitter-digest to generate my X daily digest via the default automatic flow: use saved API credentials when configured, otherwise use browser collection. Include mentions, timeline hotspots, own-account activity, and action items. For ordinary follow-ups like 要, 日报, 生成, or 继续, run the default command only. If API is configured, do not use browser/DM collection unless my latest message explicitly asks for browser mode, visible DMs, X Chat, or local browser collection."
