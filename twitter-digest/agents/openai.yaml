interface:
  display_name: "Twitter Digest"
  short_description: "Generate X/Twitter daily digests from own account"
  default_prompt: "Use $twitter-digest to generate my X daily digest through the API-only flow. API credentials are required; if they are missing or expired, run the built-in API configuration flow first, then collect only after configuration succeeds. Include mentions, timeline hotspots, own-account activity, action items, and clearly marked data gaps. For ordinary follow-ups like 要, 日报, 生成, or 继续, run the default command again and do not reuse prior context."
